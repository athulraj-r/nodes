                 oninput="document.getElementById('vl-cgravity').textContent=this.value">
          <span class="sl-val" id="vl-cgravity">0.3</span>
        </div>

        <div class="sl-row">
          <span class="sl-label">Spring Length</span>
          <input type="range" id="sl-spring" min="50" max="600" step="10" value="250"
                 oninput="document.getElementById('vl-spring').textContent=this.value">
          <span class="sl-val" id="vl-spring">250</span>
        </div>

        <div class="sl-row">
          <span class="sl-label">Spring Strength</span>
          <input type="range" id="sl-strength" min="0.0001" max="0.05" step="0.0001" value="0.001"
                 oninput="document.getElementById('vl-strength').textContent=parseFloat(this.value).toFixed(4)">
          <span class="sl-val" id="vl-strength">0.0010</span>
        </div>

        <div class="sl-row">
          <span class="sl-label">Damping</span>
          <input type="range" id="sl-damping" min="0.01" max="0.5" step="0.01" value="0.09"
                 oninput="document.getElementById('vl-damping').textContent=parseFloat(this.value).toFixed(2)">
          <span class="sl-val" id="vl-damping">0.09</span>
        </div>

        <div class="settings-toggle-row">
          <span class="toggle-label">Physics enabled</span>
          <label class="toggle-switch">
            <input type="checkbox" id="tgl-physics" checked onchange="applyPhysics()">
            <span class="toggle-track"></span>
          </label>
        </div>

        <button class="settings-apply-btn" onclick="applyPhysics()">Apply</button>
      </div>
    </div>

    <!-- ── SEARCH ── -->
    <div class="pf-row">
      <label>Start User</label>
      <input id="pf-start" type="text" placeholder="username" autocomplete="off" spellcheck="false">
    </div>
    <div class="pf-row">
      <label>End User</label>
      <input id="pf-end" type="text" placeholder="username" autocomplete="off" spellcheck="false">
    </div>

    <button class="pf-btn-green" onclick="findPath()">Find Path</button>
    <button class="pf-btn-grey"  onclick="resetGraph()">↺ Reset</button>

    <div id="pf-status"></div>

    <div id="pf-trail-wrap">
      <div id="pf-trail-label">Route</div>
      <div id="pf-trail"></div>
    </div>

    <hr class="pf-hr">
    <div id="pf-stats">
      <div class="pf-stat"><div class="pf-stat-n" id="st-nodes">—</div><div class="pf-stat-k">Nodes</div></div>
      <div class="pf-stat"><div class="pf-stat-n" id="st-edges">—</div><div class="pf-stat-k">Edges</div></div>
      <div class="pf-stat"><div class="pf-stat-n" id="st-hops">—</div><div class="pf-stat-k">Hops</div></div>
    </div>

  </div><!-- /pf-body -->
</div><!-- /pf-panel -->

<script>
(function () {

  /* ── settings drawer toggle ── */
  window.toggleSettings = function () {
    const drawer = document.getElementById('pf-settings');
    const btn    = document.getElementById('pf-gear-btn');
    const isOpen = drawer.classList.contains('open');
    drawer.classList.toggle('open', !isOpen);
    btn.classList.toggle('active', !isOpen);
  };

  /* ── wait for vis network ── */
  function whenReady(fn) {
    if (document.readyState !== 'loading') setTimeout(fn, 600);
    else document.addEventListener('DOMContentLoaded', () => setTimeout(fn, 600));
  }

  whenReady(function () {
    const net = window.network;
    if (!net) { console.warn('[PathFinder] window.network not found'); return; }

    const nodesDS = net.body.data.nodes;
    const edgesDS = net.body.data.edges;

    /* snapshot originals */
    const origNodes = {}, origEdges = {};
    nodesDS.get().forEach(n => { origNodes[n.id] = JSON.parse(JSON.stringify(n)); });
    edgesDS.get().forEach(e => { origEdges[e.id] = JSON.parse(JSON.stringify(e)); });

    document.getElementById('st-nodes').textContent = nodesDS.length;
    document.getElementById('st-edges').textContent = edgesDS.length;

    /* ── apply physics from sliders ── */
    window.applyPhysics = function () {
      const enabled  = document.getElementById('tgl-physics').checked;
      const gravity  = parseInt(document.getElementById('sl-gravity').value);
      const cgravity = parseFloat(document.getElementById('sl-cgravity').value);
      const spring   = parseInt(document.getElementById('sl-spring').value);
      const strength = parseFloat(document.getElementById('sl-strength').value);
      const damping  = parseFloat(document.getElementById('sl-damping').value);

      net.setOptions({
        physics: {
          enabled,
          barnesHut: {
            gravitationalConstant: gravity,
            centralGravity: cgravity,
            springLength: spring,
            springConstant: strength,
            damping,
          }
        }
      });
    };

    /* ── adjacency (bidirectional) ── */
    function buildAdj() {
      const adj = {};
      nodesDS.getIds().forEach(id => adj[id] = []);
      edgesDS.get().forEach(e => {
        if (!adj[e.from]) adj[e.from] = [];
        if (!adj[e.to])   adj[e.to]   = [];
        adj[e.from].push({ nb: e.to,   eid: e.id });
        adj[e.to].push(  { nb: e.from, eid: e.id });
      });
      return adj;
    }

    /* ── BFS ── */
    function bfs(start, end) {
      if (start === end) return { path: [start], eids: [] };
      const adj = buildAdj();
      if (!adj[start] || !adj[end]) return null;
      const seen  = new Set([start]);
      const queue = [{ node: start, path: [start], eids: [] }];
      while (queue.length) {
        const { node, path, eids } = queue.shift();
        for (const { nb, eid } of (adj[node] || [])) {
          if (!seen.has(nb)) {
            seen.add(nb);
            const np = [...path, nb], ne = [...eids, eid];
            if (nb === end) return { path: np, eids: ne };
            queue.push({ node: nb, path: np, eids: ne });
          }
        }
      }
      return null;
    }

    /* ── status ── */
    function setStatus(msg, cls) {
      const el = document.getElementById('pf-status');
      el.textContent = msg;
      el.className   = cls;
      el.style.display = msg ? 'block' : 'none';
    }

    /* ── path trail chips ── */
    function renderTrail(path) {
      const box = document.getElementById('pf-trail');
      box.innerHTML = '';
      document.getElementById('pf-trail-wrap').style.display = 'block';
      path.forEach((name, i) => {
        const chip = document.createElement('span');
        chip.className = 'pt-node ' + (i === 0 ? 'start' : i === path.length - 1 ? 'end' : 'mid');
        chip.textContent = name;
        chip.style.animationDelay = (i * 0.07) + 's';
        box.appendChild(chip);
        if (i < path.length - 1) {
          const arr = document.createElement('span');
          arr.className = 'pt-arrow';
          arr.textContent = '→';
          arr.style.animationDelay = (i * 0.07 + 0.035) + 's';
          box.appendChild(arr);
        }
      });
    }

    /* ── staggered graph highlight ── */
    function applyHighlight(result) {
      /* dim everything */
      nodesDS.update(nodesDS.get().map(n => ({
        id: n.id, opacity: 0.1,
        color: { background: '#111', border: '#111', highlight: { background: '#111', border: '#111' } },
        font: { color: '#111' },
      })));
      edgesDS.update(edgesDS.get().map(e => ({
        id: e.id, opacity: 0.05,
        color: { color: '#0a0a0a', highlight: '#0a0a0a', hover: '#0a0a0a' },
        width: 0.3,
      })));
      /* stagger-light nodes */
      result.path.forEach((nid, i) => {
        const isEnd = i === 0 || i === result.path.length - 1;
        setTimeout(() => {
          nodesDS.update([{
            id: nid, opacity: 1,
            color: isEnd
              ? { background: '#1db954', border: '#4ade80', highlight: { background: '#4ade80', border: '#86efac' } }
              : { background: '#15803d', border: '#1db954', highlight: { background: '#1db954', border: '#4ade80' } },
            font:   { color: '#fff', size: isEnd ? 14 : 11 },
            size:   isEnd ? 30 : 20,
            shadow: { enabled: true, color: 'rgba(29,185,84,0.75)', size: 20, x: 0, y: 0 },
          }]);
        }, i * 100);
      });
      /* stagger-light edges */
      result.eids.forEach((eid, i) => {
        setTimeout(() => {
          edgesDS.update([{
            id: eid, opacity: 1,
            color: { color: '#00ff00', highlight: '#4ade80', hover: '#4ade80' },
            width: 4,
            shadow: { enabled: true, color: 'rgba(0,255,0,0.65)', size: 14, x: 0, y: 0 },
          }]);
        }, i * 100 + 50);
      });
    }

    /* ── FIND PATH ── */
    window.findPath = function () {
      const start = document.getElementById('pf-start').value.trim().toLowerCase();
      const end   = document.getElementById('pf-end').value.trim().toLowerCase();
      document.getElementById('pf-trail-wrap').style.display = 'none';

      if (!start || !end) { setStatus('Please fill both fields.', 'err'); return; }
      const ids = new Set(nodesDS.getIds().map(String));
      if (!ids.has(start)) { setStatus(`"${start}" not found in graph.`, 'err'); return; }
      if (!ids.has(end))   { setStatus(`"${end}" not found in graph.`, 'err'); return; }

      setStatus('Searching…', 'inf');
      setTimeout(() => {
        const r = bfs(start, end);
        if (!r) {
          setStatus(`No path found between "${start}" and "${end}".`, 'err');
          document.getElementById('st-hops').textContent = '—';
          return;
        }
        const hops = r.path.length - 1;
        setStatus(`Path found — ${hops} hop${hops !== 1 ? 's' : ''}`, 'ok');
        document.getElementById('st-hops').textContent = hops;
        applyHighlight(r);
        renderTrail(r.path);
        net.fit({ nodes: r.path, animation: { duration: 900, easingFunction: 'easeInOutQuad' } });
      }, 60);
    };

    /* ── RESET ── */
    window.resetGraph = function () {
      nodesDS.update(Object.values(origNodes));
      edgesDS.update(Object.values(origEdges));
      setStatus('', '');
      document.getElementById('pf-trail-wrap').style.display = 'none';
      document.getElementById('pf-start').value = '';
      document.getElementById('pf-end').value   = '';
      document.getElementById('st-hops').textContent = '—';
      net.fit({ animation: { duration: 600, easingFunction: 'easeInOutQuad' } });
    };

    /* Enter key */
    ['pf-start', 'pf-end'].forEach(id =>
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') window.findPath();
      })
    );

    /* ── hide the pyvis-generated buttons div (show_buttons removed but just in case) ── */
    const btnsDiv = document.getElementById('config');
    if (btnsDiv) btnsDiv.style.display = 'none';

    console.log('%c[PathFinder] ready', 'color:#1db954;font-weight:bold');
  });
})();
</script>
<!-- ════════════════════════════════════════════════════════════════ -->

</body>
</html>
